version: "3.9"

services:
    redis:
        image: redis:7-alpine
        container_name: smartcity-redis
        ports:
            - "6379:6379"
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 5

    timescaledb:
        image: timescale/timescaledb:latest-pg16
        container_name: smartcity-timescaledb
        environment:
            POSTGRES_DB: smart_city
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"
        volumes:
            - timescale_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d smart_city"]
            interval: 10s
            timeout: 5s
            retries: 10

volumes:
    redis_data:
    timescale_data:
